name: Update FinVault Site

on:
  schedule:
    - cron: '0 * * * *'   # every hour at :00
  workflow_dispatch:        # manual trigger from GitHub UI
  push:
    branches: [main]
    paths: ['Finvault.py']  # re-run whenever you edit the script

permissions:
  contents: write           # needed to commit index.html back to repo

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests yfinance firebase-admin

      - name: Generate site
        env:
          # ── Backend (Firestore Admin) ──────────────────────────
          FIREBASE_SERVICE_ACCOUNT:         ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          FIREBASE_PROJECT_ID:              ${{ secrets.FIREBASE_PROJECT_ID }}
          # ── Frontend (injected into index.html at build time) ──
          FIREBASE_API_KEY:                 ${{ secrets.FIREBASE_API_KEY }}
          FIREBASE_AUTH_DOMAIN:             ${{ secrets.FIREBASE_AUTH_DOMAIN }}
          FIREBASE_STORAGE_BUCKET:          ${{ secrets.FIREBASE_STORAGE_BUCKET }}
          FIREBASE_MESSAGING_SENDER_ID:     ${{ secrets.FIREBASE_MESSAGING_SENDER_ID }}
          FIREBASE_APP_ID:                  ${{ secrets.FIREBASE_APP_ID }}
        run: python Finvault.py

      - name: Commit and push
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html data.json || true
          git diff --cached --quiet || git commit -m "chore: update market data $(date -u '+%Y-%m-%d %H:%M UTC') [skip ci]"
          git push
